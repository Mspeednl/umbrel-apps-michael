name: Build and publish Docker image

on:
  push:
    branches: [main]
    paths:
      - 'michael-apps-dividend-dashboard/app/**'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./michael-apps-dividend-dashboard/app
          file: ./michael-apps-dividend-dashboard/app/backend/Dockerfile
          push: true
          tags: ghcr.io/mspeednl/dividend-dashboard:latest
