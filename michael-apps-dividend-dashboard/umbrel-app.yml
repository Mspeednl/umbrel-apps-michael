name: Dividend Dashboard
version: "1.0.0"
tagline: Volg je aandelenportefeuille en dividendinkomen
description: >-
  Dividend Dashboard is een zelf-hosted tool om je aandelenportefeuille bij te
  houden, dividendinkomen te voorspellen, ex-dividenddata te volgen en je
  sectorspreiding te analyseren. Koersen en dividendhistorie worden live
  opgehaald via Yahoo Finance en alle bedragen worden automatisch omgerekend
  naar euro's. Al je data blijft lokaal opgeslagen op je Umbrel.
